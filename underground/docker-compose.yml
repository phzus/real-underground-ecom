services:
  ru-postgres:
    image: postgres:16-alpine
    container_name: ru-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medusa
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ru_pg_data:/var/lib/postgresql/data
    networks:
      - ru_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa -d medusa"]
      interval: 10s
      timeout: 5s
      retries: 5

  ru-redis:
    image: redis:7-alpine
    container_name: ru-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - ru_redis_data:/data
    networks:
      - ru_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ru-medusa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ru-medusa
    restart: unless-stopped
    depends_on:
      ru-postgres:
        condition: service_healthy
      ru-redis:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      BACKEND_URL: https://admin.driveitlikestoleit.com
    volumes:
      - ru_uploads:/app/server/uploads
    networks:
      - ru_internal
      - proxy

volumes:
  ru_pg_data:
  ru_redis_data:
  ru_uploads:

networks:
  ru_internal:
    driver: bridge
  proxy:
    external: true
